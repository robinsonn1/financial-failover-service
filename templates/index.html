<!DOCTYPE html>
<html>
<head>
    <title>Twilio Failover Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .json-pre { background: #0f172a; color: #38bdf8; padding: 12px; border-radius: 8px; font-size: 11px; overflow-x: auto; font-family: 'Monaco', monospace; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans p-8 flex flex-col min-h-screen">
    <div class="max-w-6xl mx-auto flex-grow w-full">
        <header class="mb-10 border-b border-slate-700 pb-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-red-500 italic tracking-tighter">Twilio <span class="text-white not-italic underline decoration-red-500 underline-offset-8">Failover Engine</span></h1>
                <p id="live-clock" class="text-[10px] text-slate-400 mt-2 uppercase tracking-[0.2em] font-mono italic"></p>
            </div>
            <button onclick="toggleAddContact()" class="bg-slate-800 border border-slate-600 px-4 py-2 rounded-full text-[11px] font-bold hover:bg-slate-700 transition-all uppercase tracking-widest">+ Sync Contact to HubSpot</button>
        </header>

        <div id="contact-modal" class="hidden mb-8 bg-slate-800/50 border border-red-500/20 p-6 rounded-xl backdrop-blur-sm shadow-2xl">
            <h3 class="text-sm font-black mb-4 uppercase text-slate-400 italic">HubSpot CRM Integration</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="new-phone" placeholder="Phone (+1...)" class="bg-slate-900 border border-slate-700 p-3 rounded-lg text-sm focus:border-red-500 outline-none">
                <input type="text" id="new-name" placeholder="First Name" class="bg-slate-900 border border-slate-700 p-3 rounded-lg text-sm focus:border-red-500 outline-none">
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="saveContact()" class="bg-red-600 px-6 py-2 rounded-lg text-xs font-black uppercase shadow-lg shadow-red-900/20">Add Record</button>
                <button onclick="toggleAddContact()" class="text-slate-500 text-xs px-4">Cancel</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="bg-slate-800/40 p-6 rounded-2xl border border-slate-700/50 h-[600px] flex flex-col shadow-inner">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest italic">Live Event Stream</h2>
                    <span class="animate-pulse w-2 h-2 bg-green-500 rounded-full"></span>
                </div>
                <div id="log-container" class="space-y-3 overflow-y-auto pr-3 flex-grow">
                    <p class="text-center text-slate-600 text-xs mt-10 italic">Awaiting triggers...</p>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white text-slate-900 p-8 rounded-2xl shadow-2xl border-t-4 border-red-600">
                    <h2 class="text-2xl font-black mb-6 tracking-tight">Financial Alert Trigger</h2>
                    <div class="space-y-4">
                        <input type="text" id="target-phone" placeholder="Member Phone Number" class="w-full p-4 border-2 border-slate-100 rounded-xl focus:border-red-500 outline-none transition-all">
                        <textarea id="alert-msg" class="w-full p-4 border-2 border-slate-100 rounded-xl h-24 focus:border-red-500 outline-none font-mono text-sm">Urgent: Unauthorized attempt detected on your checking account.</textarea>
                        <button onclick="startWorkflow()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-red-600 transition-all shadow-xl shadow-slate-900/20 uppercase tracking-widest">Execute Workflow</button>
                    </div>
                </div>

                <div id="detail-panel" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-red-400 font-bold uppercase text-[10px] tracking-widest">JSON Inspector</h3>
                        <span class="text-[9px] text-slate-500 font-mono" id="json-timestamp"></span>
                    </div>
                    <pre id="json-content" class="json-pre"></pre>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-20 border-t border-slate-800 py-10 text-center">
        <p class="text-slate-600 text-[11px] font-medium tracking-widest uppercase italic">Robinson Navarro | <span id="footer-date"></span> Twilio - All Rights Reserved</p>
    </footer>

    <script>
        let logs = [];
        
        // Dynamic Clock Functionality
        function updateClock() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short' };
            document.getElementById('live-clock').innerText = now.toLocaleString('en-US', options);
            document.getElementById('footer-date').innerText = now.getFullYear();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function toggleAddContact() { document.getElementById('contact-modal').classList.toggle('hidden'); }
        
        async function saveContact() {
            const formData = new FormData();
            formData.append('phone', document.getElementById('new-phone').value);
            formData.append('first_name', document.getElementById('new-name').value);
            const res = await fetch('/api/add-contact', { method: 'POST', body: formData });
            if(res.ok) toggleAddContact();
            updateLogs();
        }

        async function startWorkflow() {
            const phone = encodeURIComponent(document.getElementById('target-phone').value);
            const msg = encodeURIComponent(document.getElementById('alert-msg').value);
            await fetch(`/trigger/Alpha_CU?to_number=${phone}&message=${msg}`, {method: 'POST'});
            updateLogs();
        }

        async function updateLogs() {
            const res = await fetch('/api/logs');
            logs = await res.json();
            const container = document.getElementById('log-container');
            if (logs.length === 0) return;
            
            container.innerHTML = logs.map((log, i) => `
                <div onclick="showJSON(${i})" class="p-4 bg-slate-800/80 hover:bg-slate-700 cursor-pointer rounded-xl border border-slate-700 transition-all hover:scale-[1.01]">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black text-slate-500 uppercase italic">${log.timestamp || ''}</span>
                        <span class="text-[9px] bg-slate-950 px-2 py-0.5 rounded-full border border-slate-700 text-slate-300 font-bold">${log.flag}</span>
                    </div>
                    <p class="text-xs text-slate-300 font-medium">${log.event}: ${log.details}</p>
                </div>
            `).join('');
        }

        function showJSON(i) {
            document.getElementById('detail-panel').classList.remove('hidden');
            document.getElementById('json-content').innerText = JSON.stringify(logs[i].raw || logs[i], null, 2);
            document.getElementById('json-timestamp').innerText = logs[i].timestamp || new Date().toLocaleTimeString();
        }

        setInterval(updateLogs, 2000);
        updateLogs();
    </script>
</body>
</html>
